<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="cpmap-title cpmap-desc" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="cpmap-title">Party game perceptual map</title>
  <desc id="cpmap-desc">Two-axis competitive map plotting party games on online versus offline gameplay against static versus dynamic content. Most competitors cluster in offline plus static. Circle Panic is positioned alone in offline plus dynamic.</desc>

  <defs>
    <marker id="cpmap-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#718096" />
    </marker>
    <style>
      .cpmap-frame { fill: none; stroke: #d3d1c7; stroke-width: 0.5; }
      .cpmap-grid { stroke: #d3d1c7; stroke-width: 0.5; stroke-dasharray: 2 3; }
      .cpmap-axis { stroke: #718096; stroke-width: 1.5; fill: none; }
      .cpmap-axis-label { font-size: 13px; font-weight: 500; fill: #2d3748; }
      .cpmap-axis-end { font-size: 11px; fill: #718096; }
      .cpmap-quadrant { font-size: 10px; fill: #a0aec0; font-style: italic; }
      .cpmap-competitor { font-size: 12px; fill: #2d3748; }
      .cpmap-reference { font-size: 12px; fill: #718096; }
      .cpmap-reference-note { font-size: 10px; fill: #a0aec0; font-style: italic; }
      .cpmap-target-label { font-size: 13px; font-weight: 500; fill: #993c1d; }
      .cpmap-target-note { font-size: 10px; fill: #993c1d; font-style: italic; }
      .cpmap-gap-stroke { stroke: #c05621; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
      .cpmap-gap-label { font-size: 11px; fill: #c05621; font-style: italic; }
      .cpmap-source { font-size: 10px; fill: #a0aec0; }
    </style>
  </defs>

  <rect class="cpmap-frame" x="80" y="60" width="560" height="420" />
  <line class="cpmap-grid" x1="360" y1="60" x2="360" y2="480" />
  <line class="cpmap-grid" x1="80" y1="270" x2="640" y2="270" />

  <line class="cpmap-axis" x1="80" y1="480" x2="640" y2="480" marker-end="url(#cpmap-arrow)" />
  <line class="cpmap-axis" x1="80" y1="480" x2="80" y2="60" marker-end="url(#cpmap-arrow)" />

  <text class="cpmap-axis-label" x="360" y="515" text-anchor="middle">Where is it played?</text>
  <text class="cpmap-axis-end" x="105" y="500">Online (remote)</text>
  <text class="cpmap-axis-end" x="615" y="500" text-anchor="end">Offline (in-person)</text>

  <text class="cpmap-axis-label" x="35" y="270" text-anchor="middle" transform="rotate(-90, 35, 270)">Content model</text>
  <text class="cpmap-axis-end" x="75" y="75" text-anchor="end">Dynamic / live ops</text>
  <text class="cpmap-axis-end" x="75" y="475" text-anchor="end">Static / fixed</text>

  <text class="cpmap-quadrant" x="220" y="80" text-anchor="middle">Online + Dynamic</text>
  <text class="cpmap-quadrant" x="500" y="80" text-anchor="middle">Offline + Dynamic</text>
  <text class="cpmap-quadrant" x="220" y="475" text-anchor="middle">Online + Static</text>
  <text class="cpmap-quadrant" x="500" y="475" text-anchor="middle">Offline + Static</text>

  <g opacity="0.55">
    <circle cx="200" cy="160" r="6" fill="#888780" />
    <text class="cpmap-reference" x="200" y="148" text-anchor="middle">Among Us</text>
    <text class="cpmap-reference-note" x="200" y="178" text-anchor="middle">(reference, not party)</text>
  </g>

  <g opacity="0.55">
    <circle cx="155" cy="200" r="6" fill="#888780" />
    <text class="cpmap-reference" x="155" y="218" text-anchor="middle">Brawl Stars</text>
  </g>

  <g>
    <circle cx="500" cy="380" r="7" fill="#5f5e5a" />
    <text class="cpmap-competitor" x="500" y="368" text-anchor="middle">Heads Up!</text>
  </g>

  <g>
    <circle cx="540" cy="410" r="7" fill="#5f5e5a" />
    <text class="cpmap-competitor" x="558" y="414" text-anchor="start">Spaceteam</text>
  </g>

  <g>
    <circle cx="480" cy="335" r="7" fill="#5f5e5a" />
    <text class="cpmap-competitor" x="468" y="339" text-anchor="end">Truth or Dare</text>
  </g>

  <g>
    <circle cx="555" cy="350" r="7" fill="#5f5e5a" />
    <text class="cpmap-competitor" x="572" y="354" text-anchor="start">King of Booze</text>
  </g>

  <g>
    <circle cx="445" cy="400" r="7" fill="#5f5e5a" />
    <text class="cpmap-competitor" x="430" y="404" text-anchor="end">Never Have I Ever</text>
  </g>

  <ellipse class="cpmap-gap-stroke" cx="525" cy="155" rx="95" ry="60" />
  <text class="cpmap-gap-label" x="525" y="240" text-anchor="middle">unoccupied gap</text>

  <g>
    <circle cx="525" cy="155" r="11" fill="#c05621" stroke="#faece7" stroke-width="3" />
    <circle cx="525" cy="155" r="11" fill="none" stroke="#c05621" stroke-width="1" />
    <text class="cpmap-target-label" x="525" y="135" text-anchor="middle">Circle Panic</text>
    <text class="cpmap-target-note" x="525" y="120" text-anchor="middle">target position</text>
  </g>

  <text class="cpmap-source" x="80" y="545">Source: Eren Hasan Kasap competitive market scan, 2026.</text>
</svg>
